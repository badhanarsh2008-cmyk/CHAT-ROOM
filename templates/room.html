{% extends 'base.html' %}
{% block content %}
<div class="message-box">

  <div class="room-header">
    <div class="room-header-left">
      <span class="room-status-dot"></span>
      <h2>General</h2>
      <span class="room-code-badge">{{ code }}</span>
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="inputs">
    <label for="img-upload" class="img-btn" title="Send image" onclick="event.stopPropagation()">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round"
        stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2" /><circle cx="8.5"
          cy="8.5" r="1.5" />
        <polyline points="21 15 16 10 5 21" />
      </svg>
    </label>
    <input type="file" id="img-upload" accept="image/*" style="display:none"
      onchange="sendImage(this)" />
    <input type="text" placeholder="Type a message..." name="message"
      id="message" autocomplete="off" />
    <button type="button" id="send-btn" onclick="sendMessage()"
      aria-label="Send">
      <svg viewBox="0 0 24 24">
        <line x1="22" y1="2" x2="11" y2="13" />
        <polygon points="22 2 15 22 11 13 2 9 22 2" />
      </svg>
    </button>
  </div>

</div>

<script type="text/javascript">
  var socketio = io();
  const messages = document.getElementById("messages");

  const createMessage = (name, msg) => {
    const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const isSystem = name === "__system__";

    if (isSystem) {
        const div = document.createElement("div");
        div.className = "system-msg";
        div.textContent = msg;
        messages.appendChild(div);
    } else {
        const div = document.createElement("div");
        div.className = "text";
        const isImg = msg.startsWith("__img__");
        const bodyHtml = isImg
    ? `<div style="display:inline-block; position:relative;">
         <img src="${msg.slice(7)}" style="max-width:220px; max-height:200px; border-radius:8px; display:block;" />
         <a href="${msg.slice(7)}" download="image.png" style="position:absolute; top:6px; right:6px; background:rgba(0,0,0,0.6); border-radius:6px; padding:4px 6px; display:flex; align-items:center; justify-content:center; text-decoration:none;">
           <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
             <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
           </svg>
         </a>
       </div>`
    : `<span class="msg-body">${escapeHtml(msg)}</span>`;
        div.innerHTML = `<span class="sender">${escapeHtml(name)}</span>${bodyHtml}<span class="muted">${time}</span>`;
        messages.appendChild(div);
    }
    messages.scrollTop = messages.scrollHeight;
};

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  socketio.on("message", (data) => {
    createMessage(data.name, data.message);
  });

  const sendMessage = () => {
    const input = document.getElementById("message");
    if (input.value.trim() === "") return;
    socketio.emit("message", { data: input.value });
    input.value = "";
  };

  document.getElementById("message").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
      e.preventDefault();
      sendMessage();
    }
  });
  const sendImage = (input) => {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        socketio.emit("message", { data: "__img__" + e.target.result });
    };
    reader.readAsDataURL(file);
    input.value = "";
};
</script>

{% for msg in messages %}
<script type="text/javascript">
  createMessage("{{ msg.name }}", "{{ msg.message }}");
</script>
{% endfor %}

{% endblock %}
